<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture - Keystone</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f2;
            color: #1d1d1f;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: rgba(244, 244, 242, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.2rem 2.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .header-logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: #111;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .header-nav {
            display: flex;
            gap: 2rem;
        }

        .header-nav a {
            text-decoration: none;
            color: #555;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-nav a:hover {
            color: #000;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
        }

        .footer {
            width: 100%;
            padding: 1.5rem 2.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            color: #888;
            font-size: 0.85rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
        }

        .footer a {
            color: #555;
            text-decoration: none;
            transition: color 0.2s;
            margin: 0 0.5rem;
            font-weight: 500;
        }

        .footer a:hover {
            color: #000;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            border: 1px solid #eaeaea;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .architecture-img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="https://github.com/tchoupi663/keystone/" class="header-logo">Github Repository</a>
        <nav class="header-nav">
            <a href="/">Home</a>
            <a href="/architecture">Architecture</a>
            <a href="/cost">Ongoing Cost</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="container">
            <!-- Flask automatically serves files from the /static directory, 
                 so name your architecture file architecture.png or architecture.svg
                 and place it in /app/src/static/ -->
            <img class="architecture-img" src="{{ url_for('static', filename='architecture.svg') }}"
                onerror="this.onerror=null; this.src=`{{ url_for('static', filename='architecture.png') }}`;"
                alt="Keystone Architecture Diagram">
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 tchoupi663 &nbsp;|&nbsp; <a href="https://github.com/tchoupi663/keystone/" target="_blank">GitHub
            Repository</a>
    </footer>
</body>

</html>
