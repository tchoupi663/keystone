name: Terraform Plan

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*'
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-stacks:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.changed.outputs.stacks }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Terramate
        uses: terramate-io/terramate-action@v2
        with:
          version: "0.9.0"

      - name: Detect changed stacks
        id: changed
        run: |
          STACKS=$(terramate list --changed | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "stacks=$STACKS" >> "$GITHUB_OUTPUT"

  plan:
    needs: detect-stacks
    if: needs.detect-stacks.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack: ${{ fromJson(needs.detect-stacks.outputs.stacks) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Install Terragrunt
        run: |
          curl -sSL https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Install Terramate
        uses: terramate-io/terramate-action@v2

      - name: Terramate generate
        run: terramate generate

      - name: Terragrunt init + plan
        working-directory: ${{ matrix.stack }}
        run: |
          terragrunt init -reconfigure
          terragrunt plan -out=tfplan.binary
          terragrunt show -json tfplan.binary > tfplan.json

      - name: Post plan summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync('${{ matrix.stack }}/tfplan.json'));
            const adds    = plan.resource_changes?.filter(r => r.change.actions.includes('create')).length ?? 0;
            const changes = plan.resource_changes?.filter(r => r.change.actions.includes('update')).length ?? 0;
            const deletes = plan.resource_changes?.filter(r => r.change.actions.includes('delete')).length ?? 0;
            const body = `### Plan: \`${{ matrix.stack }}\`\n\n➕ ${adds} to add  ✏️ ${changes} to change  🗑 ${deletes} to destroy`;
            github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body });
