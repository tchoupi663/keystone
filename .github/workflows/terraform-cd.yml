name: Terraform CD

on:
  push:
    branches:
      - main
      - feat/**
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: "0.9.0"

      - name: Check if any stacks changed
        id: check
        run: |
          terramate generate
          CHANGED=$(terramate list --changed)
          if [ -n "$CHANGED" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected changes in stacks:"
            echo "$CHANGED"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in any stacks."
          fi

  plan:
    name: Plan
    needs: detect
    if: needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sSL https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: "0.9.0"

      - name: Terramate Run Plan
        run: |
          terramate generate
          terramate run --changed -- \
            terragrunt init -reconfigure && \
            terragrunt plan -out=tfplan.binary

  apply:
    name: Apply
    needs: [detect, plan]
    if: needs.detect.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sSL https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: "0.9.0"

      - name: Terramate Run Apply
        run: |
          terramate generate
          terramate run --changed -- \
            terragrunt init -reconfigure && \
            terragrunt apply -auto-approve
