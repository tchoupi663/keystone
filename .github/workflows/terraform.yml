name: "Terraform Deploy"

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, e.g., v1.0.0, v2.1.3

jobs:
  check-changes:
    name: Check for Terraform Changes
    runs-on: self-hosted
    outputs:
      tf_changed: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is required for dorny/paths-filter to compare the new tag with the previous tag
          fetch-depth: 0

      - name: Get Previous Tag
        id: previoustag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^1 2>/dev/null || git rev-list --max-parents=0 HEAD | tail -n 1)
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Paths Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.previoustag.outputs.tag }}
          filters: |
            terraform:
              - 'terraform/**/*.tf'
              - 'terraform/**/*.tfvars'
              - 'terraform/**/*.hcl'

  terraform:
    name: Terraform Plan & Apply
    needs: check-changes
    # This prevents the job from even starting if tf files weren't changed
    if: needs.check-changes.outputs.tf_changed == 'true'
    runs-on: self-hosted
    permissions:
      id-token: write # Required if using OIDC to authenticate with AWS
      contents: read
    
    # Prevent concurrent deployments which could lead to terraform state locks
    concurrency:
      group: terraform-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Load Environment Variables
        run: if [ -f .env ]; then cat .env >> $GITHUB_ENV; fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          # Modify to use either role-to-assume or aws-access-key-id depending on your org setup
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # -------------------------------------------------------------
      # 1. Deploy INFRA
      # -------------------------------------------------------------
      - name: Terraform Init - Infra
        working-directory: terraform/eu-north-1/infra
        run: terraform init

      - name: Terraform Plan - Infra
        working-directory: terraform/eu-north-1/infra
        run: |
          terraform workspace select dev || terraform workspace new dev
          terraform plan -var-file=tfvars/dev.tfvars -out=tfplan

      - name: Terraform Apply - Infra
        working-directory: terraform/eu-north-1/infra
        run: terraform apply -auto-approve tfplan

      # -------------------------------------------------------------
      # 2. Deploy DATA
      # -------------------------------------------------------------
      - name: Terraform Init - Data
        working-directory: terraform/eu-north-1/data
        run: terraform init

      - name: Terraform Plan - Data
        working-directory: terraform/eu-north-1/data
        run: |
          terraform workspace select dev || terraform workspace new dev
          terraform plan -var-file=tfvars/dev.tfvars -out=tfplan

      - name: Terraform Apply - Data
        working-directory: terraform/eu-north-1/data
        run: terraform apply -auto-approve tfplan

      # -------------------------------------------------------------
      # 3. Deploy APP
      # -------------------------------------------------------------
      - name: Terraform Init - App
        working-directory: terraform/eu-north-1/app
        run: terraform init

      - name: Terraform Plan - App
        working-directory: terraform/eu-north-1/app
        run: |
          terraform workspace select dev || terraform workspace new dev
          terraform plan -var-file=tfvars/dev.tfvars -out=tfplan

      - name: Terraform Apply - App
        working-directory: terraform/eu-north-1/app
        run: terraform apply -auto-approve tfplan
