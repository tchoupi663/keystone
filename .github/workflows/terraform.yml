name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - feat/**
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.0"
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sSL https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: "0.9.0"

      - name: Run Terraform Plan
        id: plan
        run: |
          terramate generate
          
          # We use -detailed-exitcode to detect changes (exit code 2)
          # We use --continue-on-error to ensure all stacks are planned
          terramate run --continue-on-error --tags child -- \
            bash -c "terragrunt init -reconfigure && terragrunt plan -detailed-exitcode; status=\$?; if [ \$status -eq 2 ]; then echo 'found' >> /tmp/tf_changes_detected; fi; if [ \$status -eq 1 ]; then exit 1; fi"
          
          if [ -f /tmp/tf_changes_detected ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Infrastructure changes detected."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No infrastructure changes detected."
          fi

  apply:
    name: Apply
    needs: plan
    # Only run apply on main branch if plan found changes
    if: |
      needs.plan.outputs.has_changes == 'true' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.0"
          terraform_wrapper: false

      - name: Install Terragrunt
        run: |
          curl -sSL https://github.com/gruntwork-io/terragrunt/releases/download/v0.55.0/terragrunt_linux_amd64 \
            -o /usr/local/bin/terragrunt
          chmod +x /usr/local/bin/terragrunt

      - name: Install Terramate
        uses: terramate-io/terramate-action@v3
        with:
          version: "0.9.0"

      - name: Terramate Run Apply
        run: |
          terramate generate
          terramate run --tags child -- \
            terragrunt init -reconfigure && \
            terragrunt apply -auto-approve
