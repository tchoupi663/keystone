name: Build and Push Container

on:
  push:
    tags:
      - 'app-*'
    # paths:
    #  - 'app/src/**'
    #  - '.github/workflows/container-build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./app/src
          file: ./app/src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Update TFVars with new image tag
        run: |
          TFVARS_FILE="terraform/eu-north-1/app/tfvars/dev.tfvars"
          
          # Ensure there's a newline at the end if we're appending
          [ -n "$(tail -c 1 "$TFVARS_FILE")" ] && echo "" >> "$TFVARS_FILE"
          
          if grep -q "^image_tag" "$TFVARS_FILE"; then
            sed -i "s/^image_tag.*/image_tag = \"${GITHUB_REF_NAME}\"/" "$TFVARS_FILE"
          else
            echo "image_tag = \"${GITHUB_REF_NAME}\"" >> "$TFVARS_FILE"
          fi

      - name: Create Pull Request with TFVars update
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(dev): update app image tag to ${{ github.ref_name }}"
          title: "Update app image tag to ${{ github.ref_name }}"
          body: "This PR automatically updates `dev.tfvars` with the newly built Docker image tag (`${{ github.ref_name }}`)."
          branch: "update-image-tag-${{ github.ref_name }}"
          base: main
